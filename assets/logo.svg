  <ellipse cx="28" cy="11" rx="3.2" ry="7" fill="#C15A3A" opacity="0.80" transform="rotate(154.2 28 28)"/>
  <ellipse cx="28" cy="11" rx="3.2" ry="7" fill="#C15A3A" opacity="0.80" transform="rotate(205.7 28 28)"/>
  <ellipse cx="28" cy="11" rx="3.2" ry="7" fill="#C15A3A" opacity="0.80" transform="rotate(257.1 28 28)"/>
